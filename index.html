<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐍 Snake Elimination Derby</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f5f5f5;
      padding: 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: #666;
    }

    .status {
      text-align: center;
      font-size: 12px;
      color: #999;
      margin-bottom: 16px;
    }

    .status.connected {
      color: #0a0;
    }

    .teams-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .team-card {
      background: #f8f8f8;
      border-radius: 8px;
      padding: 16px;
      text-align: center;
      transition: transform 0.2s;
    }

    .team-card.updated {
      animation: pulse 0.5s;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .team-name {
      font-size: 13px;
      color: #666;
      margin-bottom: 8px;
    }

    .score {
      font-size: 36px;
      font-weight: 600;
      margin: 8px 0;
    }

    .buttons {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 16px;
    }

    button {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid #ddd;
      background: white;
      font-size: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }

    button:hover {
      background: #f0f0f0;
    }

    button:active {
      transform: scale(0.95);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .leader-card {
      background: #f8f8f8;
      border-radius: 8px;
      padding: 16px;
      text-align: center;
    }

    .leader-label {
      font-size: 13px;
      color: #666;
      margin-bottom: 8px;
    }

    .leader-text {
      font-size: 18px;
      font-weight: 600;
    }

    .reset-section {
      margin-top: 24px;
      text-align: center;
    }

    .reset-btn {
      width: auto;
      height: auto;
      border-radius: 8px;
      padding: 12px 24px;
      background: #fee;
      color: #c33;
      border: 1px solid #fcc;
      font-size: 14px;
    }

    .reset-btn:hover {
      background: #fdd;
    }

    @media (max-width: 500px) {
      .teams-grid {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🐍 Culdesac Snake Elimination Derby 🐍</h1>
      <p class="subtitle">May the best serpent slayer win</p>
    </div>

    <div class="status" id="status">Connecting...</div>

    <div class="teams-grid">
      <div class="team-card" id="card1">
        <div class="team-name">Jason & Michelle</div>
        <div class="score" id="team1-score">0</div>
        <div class="buttons">
          <button onclick="addPoint(1)">+</button>
          <button onclick="removePoint(1)">−</button>
        </div>
      </div>

      <div class="team-card" id="card2">
        <div class="team-name">Dennis & Taylor</div>
        <div class="score" id="team2-score">0</div>
        <div class="buttons">
          <button onclick="addPoint(2)">+</button>
          <button onclick="removePoint(2)">−</button>
        </div>
      </div>

      <div class="team-card" id="card3">
        <div class="team-name">Andrew & Ashley</div>
        <div class="score" id="team3-score">0</div>
        <div class="buttons">
          <button onclick="addPoint(3)">+</button>
          <button onclick="removePoint(3)">−</button>
        </div>
      </div>

      <div class="team-card" id="card4">
        <div class="team-name">Caroline & Gabe</div>
        <div class="score" id="team4-score">0</div>
        <div class="buttons">
          <button onclick="addPoint(4)">+</button>
          <button onclick="removePoint(4)">−</button>
        </div>
      </div>
    </div>

    <div class="leader-card">
      <div class="leader-label">Current leader</div>
      <div class="leader-text" id="leader">Tied at 0</div>
    </div>

    <div class="reset-section">
      <button class="reset-btn" onclick="resetAll()">Reset all scores</button>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
    import { getDatabase, ref, onValue, set, update } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';

    // Your Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyAcGq-hAwjt5nfdvj6qGtUUdtwgEEnRQv8",
      authDomain: "snake-scoreboard-a0fd5.firebaseapp.com",
      databaseURL: "https://snake-scoreboard-a0fd5-default-rtdb.firebaseio.com",
      projectId: "snake-scoreboard-a0fd5",
      storageBucket: "snake-scoreboard-a0fd5.firebasestorage.app",
      messagingSenderId: "529825478727",
      appId: "1:529825478727:web:f6455767508f57c5789962"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);
    const scoresRef = ref(database, 'scores');

    // Initialize scores if they don't exist
    const initialScores = {
      team1: 0,
      team2: 0,
      team3: 0,
      team4: 0
    };

    // Listen for score updates
    onValue(scoresRef, (snapshot) => {
      const data = snapshot.val();
      if (data) {
        updateDisplay(data);
        document.getElementById('status').textContent = '🟢 Live - synced with everyone';
        document.getElementById('status').className = 'status connected';
      } else {
        // Initialize if no data exists
        set(scoresRef, initialScores);
      }
    });

    function updateDisplay(scores) {
      const teamNames = ['Jason & Michelle', 'Dennis & Taylor', 'Andrew & Ashley', 'Caroline & Gabe'];
      
      // Update each team's score
      for (let i = 1; i <= 4; i++) {
        const scoreEl = document.getElementById(`team${i}-score`);
        const newScore = scores[`team${i}`] || 0;
        const oldScore = parseInt(scoreEl.textContent);
        
        scoreEl.textContent = newScore;
        
        // Pulse animation when score changes
        if (newScore !== oldScore) {
          const card = document.getElementById(`card${i}`);
          card.classList.add('updated');
          setTimeout(() => card.classList.remove('updated'), 500);
        }
      }

      // Update leader
      const scoresArray = [
        scores.team1 || 0,
        scores.team2 || 0,
        scores.team3 || 0,
        scores.team4 || 0
      ];
      
      const maxScore = Math.max(...scoresArray);
      const leaders = scoresArray.map((s, i) => s === maxScore ? i + 1 : null).filter(x => x !== null);
      
      const leaderEl = document.getElementById('leader');
      
      if (maxScore === 0) {
        leaderEl.textContent = 'Tied at 0';
      } else if (leaders.length === 4) {
        leaderEl.textContent = `All tied at ${maxScore}`;
      } else if (leaders.length > 1) {
        const leaderNames = leaders.map(i => teamNames[i - 1]).join(', ');
        leaderEl.textContent = `${leaderNames} tied at ${maxScore}`;
      } else {
        leaderEl.textContent = `${teamNames[leaders[0] - 1]} with ${maxScore} snake${maxScore === 1 ? '' : 's'}`;
      }
    }

    // Make functions global
    window.addPoint = async function(team) {
      const snapshot = await new Promise(resolve => {
        onValue(scoresRef, resolve, { onlyOnce: true });
      });
      const currentScores = snapshot.val() || initialScores;
      const teamKey = `team${team}`;
      
      update(scoresRef, {
        [teamKey]: (currentScores[teamKey] || 0) + 1
      });
    };

    window.removePoint = async function(team) {
      const snapshot = await new Promise(resolve => {
        onValue(scoresRef, resolve, { onlyOnce: true });
      });
      const currentScores = snapshot.val() || initialScores;
      const teamKey = `team${team}`;
      const currentScore = currentScores[teamKey] || 0;
      
      if (currentScore > 0) {
        update(scoresRef, {
          [teamKey]: currentScore - 1
        });
      }
    };

    window.resetAll = function() {
      if (confirm('Are you sure you want to reset all scores? This will affect everyone viewing the scoreboard.')) {
        set(scoresRef, initialScores);
      }
    };
  </script>
</body>
</html>
