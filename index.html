<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐍 Snake Elimination Derby</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f5f5f5;
      padding: 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: #666;
    }

    .teams-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .team-card {
      background: #f8f8f8;
      border-radius: 8px;
      padding: 16px;
      text-align: center;
    }

    .team-name {
      font-size: 13px;
      color: #666;
      margin-bottom: 8px;
    }

    .score {
      font-size: 36px;
      font-weight: 600;
      margin: 8px 0;
    }

    .buttons {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 16px;
    }

    button {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid #ddd;
      background: white;
      font-size: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }

    button:hover {
      background: #f0f0f0;
    }

    button:active {
      transform: scale(0.95);
    }

    .leader-card {
      background: #f8f8f8;
      border-radius: 8px;
      padding: 16px;
      text-align: center;
    }

    .leader-label {
      font-size: 13px;
      color: #666;
      margin-bottom: 8px;
    }

    .leader-text {
      font-size: 18px;
      font-weight: 600;
    }

    .reset-section {
      margin-top: 24px;
      text-align: center;
    }

    .reset-btn {
      width: auto;
      height: auto;
      border-radius: 8px;
      padding: 12px 24px;
      background: #fee;
      color: #c33;
      border: 1px solid #fcc;
      font-size: 14px;
    }

    .reset-btn:hover {
      background: #fdd;
    }

    @media (max-width: 500px) {
      .teams-grid {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🐍 Neighborhood Snake Elimination Derby 🐍</h1>
      <p class="subtitle">May the best serpent slayer win</p>
    </div>

    <div class="teams-grid">
      <div class="team-card">
        <div class="team-name">Michelle & Jason</div>
        <div class="score" id="team1-score">0</div>
        <div class="buttons">
          <button onclick="addPoint(1)">+</button>
          <button onclick="removePoint(1)">−</button>
        </div>
      </div>

      <div class="team-card">
        <div class="team-name">Dennis & Taylor</div>
        <div class="score" id="team2-score">0</div>
        <div class="buttons">
          <button onclick="addPoint(2)">+</button>
          <button onclick="removePoint(2)">−</button>
        </div>
      </div>

      <div class="team-card">
        <div class="team-name">Andrew & Ashley</div>
        <div class="score" id="team3-score">0</div>
        <div class="buttons">
          <button onclick="addPoint(3)">+</button>
          <button onclick="removePoint(3)">−</button>
        </div>
      </div>

      <div class="team-card">
        <div class="team-name">Caroline & Gabe</div>
        <div class="score" id="team4-score">0</div>
        <div class="buttons">
          <button onclick="addPoint(4)">+</button>
          <button onclick="removePoint(4)">−</button>
        </div>
      </div>
    </div>

    <div class="leader-card">
      <div class="leader-label">Current leader</div>
      <div class="leader-text" id="leader">Tied at 0</div>
    </div>

    <div class="reset-section">
      <button class="reset-btn" onclick="resetAll()">Reset all scores</button>
    </div>
  </div>

  <script>
    // Load scores from localStorage or initialize to zeros
    let scores = JSON.parse(localStorage.getItem('snakeScores')) || [0, 0, 0, 0];

    function saveScores() {
      localStorage.setItem('snakeScores', JSON.stringify(scores));
    }

    function addPoint(team) {
      scores[team - 1]++;
      saveScores();
      updateDisplay();
    }

    function removePoint(team) {
      if (scores[team - 1] > 0) {
        scores[team - 1]--;
        saveScores();
        updateDisplay();
      }
    }

    function updateDisplay() {
      scores.forEach((score, i) => {
        document.getElementById(`team${i + 1}-score`).textContent = score;
      });
      updateLeader();
    }

    function updateLeader() {
      const maxScore = Math.max(...scores);
      const leaders = scores.map((s, i) => s === maxScore ? i + 1 : null).filter(x => x !== null);
      
      const teamNames = ['Michelle & Jason', 'Dennis & Taylor', 'Andrew & Ashley', 'Caroline & Gabe'];
      const leaderEl = document.getElementById('leader');
      
      if (maxScore === 0) {
        leaderEl.textContent = 'Tied at 0';
      } else if (leaders.length === 4) {
        leaderEl.textContent = `All tied at ${maxScore}`;
      } else if (leaders.length > 1) {
        const leaderNames = leaders.map(i => teamNames[i - 1]).join(', ');
        leaderEl.textContent = `${leaderNames} tied at ${maxScore}`;
      } else {
        leaderEl.textContent = `${teamNames[leaders[0] - 1]} with ${maxScore} snake${maxScore === 1 ? '' : 's'}`;
      }
    }

    function resetAll() {
      if (confirm('Are you sure you want to reset all scores?')) {
        scores = [0, 0, 0, 0];
        saveScores();
        updateDisplay();
      }
    }

    // Initialize display on load
    updateDisplay();
  </script>
</body>
</html>
